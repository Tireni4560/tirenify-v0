<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tirenify | Email Breach Check</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="brand">Tirenify</div>

    <h1>Check if your email has been exposed</h1>
    <p class="subtitle">
      Find out whether your email has appeared in known data breaches.
    </p>
    
    <form id="breachForm" class="breach-form">
      <label for="email">Email address</label>
      <input
        type="email"
        id="email"
        name="email"
        placeholder="Enter your email address"
        required
      />
      <p class="trust-note">
        Enter an email to run a breach exposure check
      </p>
      <button type="submit">Check Exposure</button>
    </form>
<div id="spinner" class="spinner" style="display:none;"></div>

    <div id="result" class="result">
      <p>Your breach results will appear here.</p>
    </div>
<br>
<br>
    <p class="footer-text">Protecting individuals in the digital world.</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
